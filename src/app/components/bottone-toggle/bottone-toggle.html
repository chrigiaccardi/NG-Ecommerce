<button
    class="w-10 h-10 rounded-xl !bg-white border-0 shadow-md flex items-center justify-center cursor-pointer transition-all duration-200 hover:shadow-lg"
    [class]="presenteNellaListaDesideri() ? '!text-red-500' : '!text-gray-400' " matIconButton
    (click)="toggleListaDesideri(prodotto())">
    <mat-icon>{{presenteNellaListaDesideri() ? 'favorite' : 'favorite_border'}}</mat-icon>
</button>
