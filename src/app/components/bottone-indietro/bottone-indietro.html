<!-- Il bottone indietro lo configuriamo per riutilizzarlo anche in altri componenti.
 Il router link con andare verso nuoto e il ?? null non lo fa creshare ma mi da la possibilita,
 di impostarlo dal parent quando utilizzo il component chiamando il metodo (andareVerso)="..." -->
 <button matButton="text" [routerLink]="andareVerso() ?? null" class="-ms-2 flex item-center gap-1">
    <mat-icon>arrow_back</mat-icon>
    {{label()}}
 </button>
