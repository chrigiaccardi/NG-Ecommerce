<!-- Il div contiene le azioni -->
<div class="flex items-center gap-2">

    <!-- Il bottone con la direttiva matIconButton prende le specifiche di A Material per un'icona Bottone,
     il routerLink al link reindirizza alla pagina selezionata.
     Con il matBadge che visualizza il contatore lo impostiamo come il signal computer creato in store-->
    <button matIconButton routerLink="/lista-desideri" [matBadge]="store.conteggioListaDesideri()" [matBadgeHidden]="store.conteggioListaDesideri() === 0">
        <mat-icon>favorite</mat-icon>
    </button>

    <!-- Il bottone con matBadge crea il numerino in base alla lunghezza dell'array del carrello -->
    <button matIconButton routerLink="/carrello" [matBadge]="store.conteggioCarrello()" [matBadgeHidden]="store.conteggioCarrello() === 0" >
        <mat-icon>shopping_cart</mat-icon>
    </button>

    <!-- I bottoni Sign In e Sign Up sono bottoni material normali, utilizziamo un if per cambiare
     i bottoni nel caso il login sia effettuato oppure no -->
     @if (store.user(); as user) {

        <!-- matMenuTriggerFor è una direttiva ng Material per far si che al click si apra uno specifico menu,
         in questo caso userMenu -->
        <button matIconButton [matMenuTriggerFor]="userMenu">
            <img [src]="user.imageUrl" [alt]="user.name" class="w-8 h-8 rounded-full">
        </button>
        <!-- Creiamo l'userMenu con ng Mat che si vedrà al click sul bottone img,
         dove abbiamo nome, email e il tasto per il logout. xPosition before imposta che
         il menù si apra a sx del bottone, invece after (default) si apre a dx-->
        <mat-menu #userMenu="matMenu" xPosition="before">
            <div class="flex flex-col px-3 min-w-[200px]">
                <span class="text-sm font-medium"> {{user.name}}</span>
                <span class="text-xs text-gray-500"> {{user.email}}</span>
            </div>
            <mat-divider></mat-divider>
            <button class="!min-h-[32px]" mat-menu-item (click)="store.signOut()">
                <mat-icon>logout</mat-icon>
                Sign Out
            </button>
        </mat-menu>
     } @else {
        <!-- Se non siamo loggati farà vedere bottoni accedi e iscriviti -->
        <button matButton="tonal" (click)="apriSignInDialog()"> Sign In </button>
        <button matButton="filled" (click)="apriSignUpDialog()"> Sign Up </button>
     }
    
</div>
