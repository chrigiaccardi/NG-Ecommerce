<!-- Creiamo la vista del carrello -->
<div class="mx-auto max-w-[1200px] py-6">

    <!-- Bottone per tornare indietro e titolo pagina -->
    <app-bottone-indietro class="mb-6" andareVerso="/prodotti/tutti">Continua Lo Shopping</app-bottone-indietro>
    <h1 class="text-3xl font-extrabold mb-4 px-4">Carrello</h1>

    <!-- Creiamo un pannello aggiuntivo per la visualizzazione della lista desideri e nel caso aggiungerli al carrello -->
     <app-pannello-lista-desideri-carrello class="mb-6 block"/>

    <!-- Creiamo un nuovo componente per la lista dei prodotti da comprare -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2">
             <app-lista-prodotti-carrello />
        </div>
        <!-- Creiamo il pannello, con un nuovo componente, per la somma totale del carrello -->
        <div>
            <app-sommario-ordine>
                <!-- Utilizziamo un ng-container che è un container vuoto e non verrà renderizzato nel dom finale.
                 ng-container ha l'attributo bottoniAzione e quindi verrà preso e inserito nel ng-content child -->
                 <ng-container bottoniAzione>

                    <!-- Al click del bottone attiviamo il metodo -->
                    <button matButton="filled" class="w-full mt-6 py-3" (click)="store.checkoutDialog()"> Procedi al Checkout </button>
                 </ng-container>
            </app-sommario-ordine>
        </div>

</div>
