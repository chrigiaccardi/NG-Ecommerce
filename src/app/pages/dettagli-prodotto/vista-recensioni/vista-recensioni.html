<!-- Creiamo la vista recensioni con le specifiche del pannello Carrello -->
<div appPannelloCarrello>
    <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-semibold">Recensioni Utente</h2>
    </div>
    <app-sommario-rating [prodotto]="prodotto()"/>
    <div class="flex flex-col gap-6">
        @for (recensione of prodotto().recensioni; track recensione.id) {
            <app-recensione-singola [recensione]="recensione" />
        }
    </div>
</div>
