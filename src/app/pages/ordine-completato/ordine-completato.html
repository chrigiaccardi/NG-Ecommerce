<!-- Creiamo la visualizzazione dell'ordine completato non appena il pagamento va a buon fine.
 h-calc sta ad indicare il calcolo per l'altezza di 100% dello schermo - 64px -->
 <div class="flex justify-center items-center h-[calc(100vh-64px)] py-6">
    <div class="flex flex-col items-center justify-center text-center bg-white rounded-xl shadow p-8 gap-6">
        <mat-icon class="!text-green-500 !h-[56px] !w-[56px] !text-[56px]">check_circle</mat-icon>
        <h2 class="font-semibold text-green-600 text-2xl">Ordine Completato!</h2>
        <p class="text-base">
            Grazie per il tuo ordine! Non appena il tuo ordine verrà confermato prepareremo la spedizione
        </p>
        <p class="text-gray-600">
            Riceverai una email di conferma con i dettagli dell'ordine e le informazioni di spedizione
        </p>
        <button matButton="filled" color="primary" class="w-full max-w-xs mt-2" routerLink="/">
            Ritorna alla Pagina Principale
        </button>

    </div>
 </div>
